<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.25"/>
  </filter>
</defs>
<style>
  .panel { filter: url(#shadow); }
  text { font-family: 'DejaVu Sans', 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
</style>

<rect x="0" y="0" width="1900" height="1320" rx="0" fill="#f8fafc" stroke="none" stroke-width="0" class=""/>
<text x="56" y="58" font-size="34" font-weight="800" fill="#0f172a" text-anchor="start">QwenA1 Folded Architecture</text>
<text x="56" y="92" font-size="18" font-weight="500" fill="#334155" text-anchor="start">Checkpoint: qwen3_vl_28l + qwen3_28l | chunk_size=50 | image=224x224 | denoise steps=10</text>
<text x="56" y="118" font-size="18" font-weight="500" fill="#334155" text-anchor="start">Sizes below are from a real local sample: batch=1, index=0</text>
<rect x="42" y="150" width="350" height="235" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2.2" class=""/>
<text x="60" y="184" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">Input Assembly</text>
<text x="60" y="218" font-size="16" font-weight="400" fill="#111827" text-anchor="start">3 cameras x 2 frames each</text>
<text x="60" y="239" font-size="16" font-weight="400" fill="#111827" text-anchor="start">stacked images: [B,3,2,3,224,224]</text>
<text x="60" y="260" font-size="16" font-weight="400" fill="#111827" text-anchor="start">raw state: [B,16] -&gt; padded: [B,32]</text>
<text x="60" y="281" font-size="16" font-weight="400" fill="#111827" text-anchor="start">pixel_values: [B,768,1536]</text>
<text x="60" y="302" font-size="16" font-weight="400" fill="#111827" text-anchor="start">image_grid_thw: [B,3,3]</text>
<text x="60" y="323" font-size="16" font-weight="400" fill="#111827" text-anchor="start">input_ids / attention_mask: [B,246]</text>
<rect x="430" y="140" width="420" height="500" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="2.6" class="panel"/>
<text x="452" y="176" font-size="26" font-weight="800" fill="#1d4ed8" text-anchor="start">Prefix Branch</text>
<text x="452" y="202" font-size="16" font-weight="500" fill="#1e3a8a" text-anchor="start">Qwen3-VL visual + language prefix trunk</text>
<rect x="452" y="226" width="376" height="108" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="2.2" class=""/>
<text x="470" y="260" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">P1 Visual Encoder x24</text>
<text x="470" y="294" font-size="16" font-weight="400" fill="#111827" text-anchor="start">vision hidden=1024, visual out=2048</text>
<text x="470" y="315" font-size="16" font-weight="400" fill="#111827" text-anchor="start">3 images, each grid = [1,16,16]</text>
<text x="470" y="336" font-size="16" font-weight="400" fill="#111827" text-anchor="start">per image visual tokens = 64</text>
<rect x="452" y="356" width="376" height="96" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="2.2" class=""/>
<text x="470" y="390" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">P2 Token Fusion</text>
<text x="470" y="424" font-size="16" font-weight="400" fill="#111827" text-anchor="start">replace image placeholders inside text embeddings</text>
<text x="470" y="445" font-size="16" font-weight="400" fill="#111827" text-anchor="start">output prefix_embs: [B,246,2048]</text>
<rect x="452" y="474" width="376" height="130" rx="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2.2" class=""/>
<text x="470" y="508" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">P3 Qwen3-VL Language Trunk x28</text>
<text x="470" y="542" font-size="16" font-weight="400" fill="#111827" text-anchor="start">hidden=2048, head_dim=128</text>
<text x="470" y="563" font-size="16" font-weight="400" fill="#111827" text-anchor="start">attn heads=16, kv heads=8</text>
<text x="470" y="584" font-size="16" font-weight="400" fill="#111827" text-anchor="start">build KV cache over 246 prefix tokens</text>
<text x="470" y="605" font-size="16" font-weight="400" fill="#111827" text-anchor="start">cached length after prefix = 246</text>
<line x1="640" y1="334" x2="640" y2="356" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="640" y1="452" x2="640" y2="474" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="890" y="140" width="430" height="500" rx="24" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.6" class="panel"/>
<text x="912" y="176" font-size="26" font-weight="800" fill="#15803d" text-anchor="start">Middle Branch</text>
<text x="912" y="202" font-size="16" font-weight="500" fill="#166534" text-anchor="start">Cosmos tokenizer + generation expert trunk</text>
<rect x="912" y="226" width="386" height="108" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="2.2" class=""/>
<text x="930" y="260" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">M1 Cosmos Encode</text>
<text x="930" y="294" font-size="16" font-weight="400" fill="#111827" text-anchor="start">middle input = images[:, :, :2]</text>
<text x="930" y="315" font-size="16" font-weight="400" fill="#111827" text-anchor="start">6 images = 3 views x 2 frames</text>
<text x="930" y="336" font-size="16" font-weight="400" fill="#111827" text-anchor="start">224x224 -&gt; resize to 256x256 -&gt; latent [B,3,2,16,32,32]</text>
<rect x="912" y="356" width="386" height="118" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="2.2" class=""/>
<text x="930" y="390" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">M2 Conv Projection + Downsample</text>
<text x="930" y="424" font-size="16" font-weight="400" fill="#111827" text-anchor="start">1x1 conv: 16 -&gt; 1024</text>
<text x="930" y="445" font-size="16" font-weight="400" fill="#111827" text-anchor="start">stride-8 conv: spatial 32x32 -&gt; 4x4</text>
<text x="930" y="466" font-size="16" font-weight="400" fill="#111827" text-anchor="start">cosmos_feat_shape: [B,3,2,1024,4,4]</text>
<rect x="912" y="496" width="386" height="108" rx="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="2.2" class=""/>
<text x="930" y="530" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">M3 Flatten + Gen Expert x28</text>
<text x="930" y="564" font-size="16" font-weight="400" fill="#111827" text-anchor="start">flatten tokens: [B,96,1024] = 3 x 2 x 4 x 4</text>
<text x="930" y="585" font-size="16" font-weight="400" fill="#111827" text-anchor="start">gen expert hidden=1024</text>
<text x="930" y="606" font-size="16" font-weight="400" fill="#111827" text-anchor="start">output middle_out: [B,96,1024]</text>
<line x1="1105" y1="334" x2="1105" y2="356" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1105" y1="474" x2="1105" y2="496" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="1360" y="140" width="490" height="650" rx="24" fill="#fff7ed" stroke="#ea580c" stroke-width="2.6" class="panel"/>
<text x="1382" y="176" font-size="26" font-weight="800" fill="#c2410c" text-anchor="start">Suffix Branch / One Denoise Step</text>
<text x="1382" y="202" font-size="16" font-weight="500" fill="#9a3412" text-anchor="start">State + noisy action + time embedding -&gt; act expert</text>
<rect x="1382" y="226" width="446" height="94" rx="18" fill="#ffedd5" stroke="#fb923c" stroke-width="2.2" class=""/>
<text x="1400" y="260" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">S1 State Projection</text>
<text x="1400" y="294" font-size="16" font-weight="400" fill="#111827" text-anchor="start">state [B,32] -&gt; state token [B,1,1024]</text>
<rect x="1382" y="342" width="446" height="94" rx="18" fill="#ffedd5" stroke="#fb923c" stroke-width="2.2" class=""/>
<text x="1400" y="376" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">S2 Action Projection</text>
<text x="1400" y="410" font-size="16" font-weight="400" fill="#111827" text-anchor="start">noise / x_t: [B,50,32] -&gt; [B,50,1024]</text>
<rect x="1382" y="458" width="446" height="118" rx="18" fill="#ffedd5" stroke="#fb923c" stroke-width="2.2" class=""/>
<text x="1400" y="492" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">S3 Time Embedding + MLP</text>
<text x="1400" y="526" font-size="16" font-weight="400" fill="#111827" text-anchor="start">time embedding: [B,1024], broadcast to 50 tokens</text>
<text x="1400" y="547" font-size="16" font-weight="400" fill="#111827" text-anchor="start">concat action + time: [B,50,2048]</text>
<text x="1400" y="568" font-size="16" font-weight="400" fill="#111827" text-anchor="start">MLP 2048 -&gt; 1024 -&gt; 1024</text>
<rect x="1382" y="598" width="446" height="130" rx="18" fill="#fed7aa" stroke="#f97316" stroke-width="2.2" class=""/>
<text x="1400" y="632" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">S4 Concat + Act Expert x28 + Output</text>
<text x="1400" y="666" font-size="16" font-weight="400" fill="#111827" text-anchor="start">suffix_embs: [B,51,1024] = 1 state + 50 action tokens</text>
<text x="1400" y="687" font-size="16" font-weight="400" fill="#111827" text-anchor="start">act expert hidden=1024</text>
<text x="1400" y="708" font-size="16" font-weight="400" fill="#111827" text-anchor="start">take last 50 tokens -&gt; [B,50,1024]</text>
<text x="1400" y="729" font-size="16" font-weight="400" fill="#111827" text-anchor="start">action_out_proj: 1024 -&gt; 32, so v_t = [B,50,32]</text>
<line x1="1605" y1="320" x2="1605" y2="342" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1605" y1="436" x2="1605" y2="458" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1605" y1="576" x2="1605" y2="598" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<polyline points="392,268 430,268 430,268 452,268" fill="none" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<polyline points="850,540 890,540 890,540 912,540" fill="none" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<polyline points="828,540 860,540 860,390 1360,390 1382,390" fill="none" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<polyline points="640,604 640,700 1105,700 1105,620 1605,620" fill="none" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="590" y="700" width="440" height="144" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2.2" class=""/>
<text x="608" y="734" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">Denoise Loop x10</text>
<text x="608" y="768" font-size="16" font-weight="400" fill="#111827" text-anchor="start">initialize x_t = noise with shape [B,50,32]</text>
<text x="608" y="789" font-size="16" font-weight="400" fill="#111827" text-anchor="start">dt = -1 / 10</text>
<text x="608" y="810" font-size="16" font-weight="400" fill="#111827" text-anchor="start">repeat: x_t &lt;- x_t + dt * v_t</text>
<text x="608" y="831" font-size="16" font-weight="400" fill="#111827" text-anchor="start">prefix KV cache length = 246, prefix+middle cache = 342</text>
<rect x="1080" y="700" width="360" height="144" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2.2" class=""/>
<text x="1098" y="734" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">Final Action Output</text>
<text x="1098" y="768" font-size="16" font-weight="400" fill="#111827" text-anchor="start">internal action tensor: [B,50,32]</text>
<text x="1098" y="789" font-size="16" font-weight="400" fill="#111827" text-anchor="start">physical action slice: first 16 dims -&gt; [B,50,16]</text>
<text x="1098" y="810" font-size="16" font-weight="400" fill="#111827" text-anchor="start">deterministic compare path uses shared noise</text>
<rect x="1080" y="876" width="540" height="204" rx="18" fill="#fdf2f8" stroke="#ec4899" stroke-width="2.2" class=""/>
<text x="1098" y="910" font-size="22" font-weight="700" fill="#0f172a" text-anchor="start">Optional Image Reconstruction Head</text>
<text x="1098" y="944" font-size="16" font-weight="400" fill="#111827" text-anchor="start">middle_out [B,96,1024] -&gt; reshape [B,3,2,1024,4,4]</text>
<text x="1098" y="965" font-size="16" font-weight="400" fill="#111827" text-anchor="start">temporal mean -&gt; [B,3,1024,4,4]</text>
<text x="1098" y="986" font-size="16" font-weight="400" fill="#111827" text-anchor="start">upsample conv: 4x4 -&gt; 32x32</text>
<text x="1098" y="1007" font-size="16" font-weight="400" fill="#111827" text-anchor="start">LayerNorm + Linear 1024 -&gt; 16 -&gt; [B,3,16,32,32]</text>
<text x="1098" y="1028" font-size="16" font-weight="400" fill="#111827" text-anchor="start">Cosmos decode -&gt; reconstructed RGB images</text>
<line x1="1605" y1="728" x2="1605" y2="772" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<polyline points="1605,772 1605,820 1030,820" fill="none" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1030" y1="772" x2="1080" y2="772" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1260" y1="844" x2="1260" y2="876" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="42" y="930" width="980" height="300" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" class="panel"/>
<text x="64" y="968" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start">Notes</text>
<text x="64" y="1006" font-size="18" font-weight="400" fill="#111827" text-anchor="start">1. Prefix length 246 = 3 images x (64 visual tokens + 2 delimiters) + 48 text tokens.</text>
<text x="64" y="1040" font-size="18" font-weight="400" fill="#111827" text-anchor="start">2. Middle token count 96 = 3 views x 2 frames x 4 x 4 after Cosmos downsample.</text>
<text x="64" y="1074" font-size="18" font-weight="400" fill="#111827" text-anchor="start">3. Suffix token count 51 = 1 state token + 50 action tokens.</text>
<text x="64" y="1108" font-size="18" font-weight="400" fill="#111827" text-anchor="start">4. Repeated blocks are folded in the diagram: visual x24, prefix LM x28, gen expert x28, act expert x28.</text>
<text x="64" y="1142" font-size="18" font-weight="400" fill="#111827" text-anchor="start">5. Actual hidden sizes for this checkpoint: prefix branch 2048, middle/suffix branches 1024.</text>
<text x="64" y="1176" font-size="18" font-weight="400" fill="#111827" text-anchor="start">6. This SVG is rendered from the local validated QwenA1 checkpoint and one real sample shape trace.</text>
<rect x="1060" y="1110" width="790" height="120" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" class="panel"/>
<text x="1082" y="1146" font-size="22" font-weight="800" fill="#0f172a" text-anchor="start">File</text>
<text x="1082" y="1184" font-size="18" font-weight="400" fill="#111827" text-anchor="start">qwena1_architecture.svg</text>
<text x="1082" y="1212" font-size="18" font-weight="400" fill="#111827" text-anchor="start">Generated for folded architecture review and inference acceleration planning.</text>
</svg>